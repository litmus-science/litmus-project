webhooks:
  experimentClaimed:
    post:
      summary: Experiment claimed by operator
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  enum: [experiment.claimed]
                experiment_id:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                data:
                  type: object
                  properties:
                    operator_id:
                      type: string
                    estimated_completion:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Webhook received

  experimentCompleted:
    post:
      summary: Experiment completed, results ready
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  enum: [experiment.completed]
                experiment_id:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                data:
                  type: object
                  properties:
                    hypothesis_supported:
                      type: boolean
                    results_url:
                      type: string
                      format: uri
      responses:
        '200':
          description: Webhook received
